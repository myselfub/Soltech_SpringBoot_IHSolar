<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<!-- 공통 CSS -->
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>
	<main>
		<div class="login-screen">
			<div class="login-box">
				<form class="login-content" th:action="@{/login}" method="POST">
					<span class="login-title">Login</span> <select id="loginUser"
						name="userId" class="login-user" title="로그인 방식">
						<option value="user">사용자</option>
						<option value="admin">관리자</option>
					</select> <input id="loginPassword" class="login-pw" name="userPw"
						type="password" placeholder="Password" title="로그인 비밀번호" />
					<button class="login-btn" type="submit" title="로그인 버튼">Login</button>
				</form>
				<div th:if="${errorMsg}">
					<p th:text="${errorMsg}" style="color: #DD0000;"></p>
				</div>
			</div>
			<div class="login-image-box"></div>
		</div>
	</main>
	<!-- 공통 JS -->
	<script type="text/javascript"
		th:src="@{/js/jquery-3.5.1/jquery-3.5.1.min.js}"></script>
	<script type="text/javascript" th:src="@{/js/common.js}"></script>
